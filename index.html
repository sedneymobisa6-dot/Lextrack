    'Authorization': `Bearer ${tok || SUPABASE_ANON}`,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  }),
  async get(table, query, tok) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query||''}`, { headers: sb.h(tok) });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    return r.json();
  },
  async post(table, data, tok) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method:'POST', headers: sb.h(tok), body: JSON.stringify(data) });

    return r.json();
  },
  async patch(table, id, data, tok) {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method:'PATCH', headers: sb.h(tok), body: JSON.stringify(data) });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    return r.json();

    const r = await fetch(`${SUPABASE_URL}/auth/v1/signup`, { method:'POST', headers: sb.h(), body: JSON.stringify({email, password}) });

    const d = await r.json();
    if (d.error_description || d.error) throw new Error(d.error_description || d.error || 'Login failed');
    return d;

    await fetch(`${SUPABASE_URL}/auth/v1/logout`, { method:'POST', headers: sb.h(tok) });
